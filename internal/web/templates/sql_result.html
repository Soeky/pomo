{{define "sql-result.html"}}
{{if .Error}}
<p style="color:#d64545">{{.Error}}</p>
{{else}}
  {{if .Message}}<p>{{.Message}}</p>{{end}}
  {{if .Columns}}
  <table>
    <thead><tr>{{range .Columns}}<th>{{.}}</th>{{end}}</tr></thead>
    <tbody>
      {{range .Rows}}
      <tr>{{range .}}<td>{{.}}</td>{{end}}</tr>
      {{end}}
    </tbody>
  </table>
  {{end}}
{{end}}
{{end}}
