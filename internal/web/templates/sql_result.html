{{define "sql-result.html"}}
{{if .Error}}
<p class="status-error">{{.Error}}</p>
{{else}}
  {{if .Message}}<p class="meta-row">{{.Message}}</p>{{end}}
  {{if .Columns}}
  <div class="table-shell">
    <table>
      <thead>
        <tr>{{range .Columns}}<th>{{.}}</th>{{end}}</tr>
      </thead>
      <tbody>
        {{range .Rows}}
        <tr>{{range .}}<td>{{.}}</td>{{end}}</tr>
        {{end}}
      </tbody>
    </table>
  </div>
  {{end}}
{{end}}
{{end}}
