{{define "styles.html"}}
<style>
  :root {
    --bg: #0c1218;
    --bg-soft: #121b24;
    --surface: #17222f;
    --surface-2: #1f2d3d;
    --text: #edf3f8;
    --text-muted: #9db0c3;
    --line: #2b3b4e;
    --line-strong: #3a4f67;
    --accent: #2ea27f;
    --accent-strong: #208062;
    --accent-soft: rgba(46, 162, 127, 0.16);
    --focus: #4f93ff;
    --focus-soft: rgba(79, 147, 255, 0.28);
    --danger: #ff6d63;
    --danger-soft: rgba(255, 109, 99, 0.15);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 2px 8px rgba(5, 10, 16, 0.24);
    --shadow-md: 0 14px 30px rgba(5, 10, 16, 0.34);
    --sidebar-w: 250px;

    --fc-page-bg: #122030;
    --fc-grid: #2f4157;
    --fc-grid-strong: #3e5672;
    --fc-header-bg: #1a2a3d;
    --fc-time-bg: #111c2a;
    --fc-button-bg: #203246;
    --fc-button-border: #3b516c;
    --fc-button-text: #dce8f2;
  }

  html[data-theme="light"] {
    --bg: #ebf1f7;
    --bg-soft: #f3f7fb;
    --surface: #ffffff;
    --surface-2: #f7fbff;
    --text: #192737;
    --text-muted: #5f7388;
    --line: #d6dfe8;
    --line-strong: #c1cedc;
    --accent: #0d8465;
    --accent-strong: #0a6a51;
    --accent-soft: rgba(13, 132, 101, 0.12);
    --focus: #1f67d2;
    --focus-soft: rgba(31, 103, 210, 0.18);
    --danger: #be2f25;
    --danger-soft: rgba(190, 47, 37, 0.14);
    --shadow-sm: 0 2px 7px rgba(16, 24, 40, 0.08);
    --shadow-md: 0 14px 26px rgba(16, 24, 40, 0.12);

    --fc-page-bg: #fbfdff;
    --fc-grid: #d8e2ed;
    --fc-grid-strong: #c7d5e5;
    --fc-header-bg: #eff5fc;
    --fc-time-bg: #f9fcff;
    --fc-button-bg: #f0f5fb;
    --fc-button-border: #d2deeb;
    --fc-button-text: #243547;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    color: var(--text);
    font-family: "Space Grotesk", "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 88% -6%, rgba(46, 162, 127, 0.22) 0%, transparent 32%),
      radial-gradient(circle at 8% 100%, rgba(63, 132, 255, 0.14) 0%, transparent 35%),
      var(--bg);
  }

  .app-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
  }

  .sidebar {
    border-right: 1px solid var(--line);
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    padding: 18px 14px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    z-index: 15;
  }

  .brand {
    margin: 6px 10px 14px;
    font-size: 0.76rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 700;
  }

  .nav-link {
    display: flex;
    align-items: center;
    margin: 4px 0;
    padding: 10px 12px;
    border-radius: 10px;
    color: var(--text-muted);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.94rem;
    border: 1px solid transparent;
  }

  .nav-link:hover {
    color: var(--text);
    border-color: var(--line);
    background: var(--surface-2);
  }

  .nav-link.active {
    color: var(--text);
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .theme-box {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  .theme-toggle {
    width: 100%;
  }

  .layout-main {
    min-width: 0;
    padding: 22px;
  }

  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 12px;
  }

  .page-title {
    margin: 0;
    font-size: clamp(1.45rem, 2.4vw, 2.05rem);
    line-height: 1.06;
  }

  .page-subtitle {
    margin: 7px 0 0;
    font-size: 0.9rem;
    color: var(--text-muted);
    max-width: 72ch;
  }

  .panel,
  .card,
  .table-shell {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
  }

  .panel,
  .card {
    padding: 15px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(248px, 1fr));
    gap: 12px;
  }

  .dashboard-grid {
    align-items: start;
  }

  .dashboard-hero {
    margin-bottom: 12px;
    border-style: dashed;
  }

  .module-card {
    min-height: 170px;
  }

  .module-skeleton {
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .module-head {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: baseline;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 9px;
  }

  .module-head h2,
  .panel h2,
  .card h2 {
    margin: 0;
    font-size: 1.03rem;
  }

  .module-window {
    font-size: 0.74rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 700;
  }

  .metric-grid {
    display: grid;
    gap: 8px;
  }

  .metric-grid-5 {
    grid-template-columns: repeat(auto-fit, minmax(106px, 1fr));
  }

  .metric-grid-2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .metric-tile {
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    padding: 8px;
  }

  .metric-label {
    display: block;
    font-size: 0.74rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 700;
  }

  .metric-value {
    display: block;
    margin-top: 2px;
    font-size: 1.1rem;
  }

  .topic-list,
  .schedule-list {
    display: grid;
    gap: 8px;
  }

  .topic-row,
  .schedule-item {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 9px;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    font-size: 0.88rem;
  }

  .schedule-item-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    color: var(--text-muted);
    white-space: nowrap;
    font-size: 0.78rem;
  }

  .muted {
    color: var(--text-muted);
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
    align-items: end;
  }

  label {
    display: block;
    margin: 2px 0;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
  }

  input,
  select,
  textarea {
    width: 100%;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    background: var(--bg-soft);
    color: var(--text);
    min-height: 36px;
    padding: 7px 10px;
    font: inherit;
    font-size: 0.9rem;
  }

  input[type="checkbox"],
  input[type="radio"] {
    width: auto;
    min-height: 0;
    padding: 0;
    accent-color: var(--accent);
  }

  .toolbar input,
  .toolbar select {
    width: auto;
    min-width: 132px;
  }

  textarea {
    min-height: 112px;
    resize: vertical;
    font-family: "JetBrains Mono", "IBM Plex Mono", Menlo, Consolas, monospace;
    font-size: 0.86rem;
    line-height: 1.42;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: 2px solid var(--focus-soft);
    border-color: var(--focus);
    box-shadow: none;
  }

  .btn {
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    min-height: 36px;
    padding: 7px 12px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.87rem;
    transition: 120ms ease;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent-strong);
  }

  .btn-secondary {
    background: var(--surface-2);
    border-color: var(--line-strong);
    color: var(--text);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
  }

  .btn-danger {
    background: var(--danger-soft);
    border-color: var(--danger);
    color: var(--danger);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
  }

  th,
  td {
    padding: 10px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    font-size: 0.9rem;
  }

  th {
    font-size: 0.76rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface-2);
  }

  .table-shell {
    overflow: auto;
  }

  .meta-row {
    color: var(--text-muted);
    margin-top: 8px;
    font-size: 0.85rem;
  }

  .status-error {
    color: var(--danger);
    font-weight: 700;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--text);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .mobile-top {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 8px;
  }

  .mobile-toggle {
    min-width: 44px;
  }

  .mobile-brand {
    font-size: 0.84rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .sidebar-backdrop {
    display: none;
  }

  .calendar-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 12px;
    align-items: start;
  }

  .calendar-main {
    padding: 10px;
  }

  .calendar-side {
    display: grid;
    gap: 10px;
    padding: 10px;
  }

  .panel-block {
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 10px;
    background: var(--surface-2);
  }

  .dense-form {
    display: grid;
    gap: 8px;
  }

  .form-split {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .calendar-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 2px 0 10px;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.76rem;
    color: var(--text-muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 8px;
    background: var(--surface-2);
  }

  .legend-swatch {
    width: 9px;
    height: 9px;
    border-radius: 999px;
    display: inline-block;
  }

  .legend-focus {
    background: #2ea27f;
  }

  .legend-break {
    background: #7a8fa3;
  }

  .legend-planned {
    background: #2f70d8;
  }

  .legend-recurring {
    background: #c27a1f;
  }

  .legend-scheduler {
    background: #2f9f56;
  }

  .recur-list {
    margin-top: 8px;
  }

  .recur-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
    border-top: 1px solid var(--line);
    padding-top: 8px;
  }

  .recur-meta small {
    color: var(--text-muted);
    line-height: 1.35;
  }

  #calendar {
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
    background: var(--fc-page-bg);
    padding: 8px;
    box-shadow: var(--shadow-sm);
  }

  .fc {
    --fc-border-color: var(--fc-grid);
    --fc-now-indicator-color: #ef4444;
    color: var(--text);
    font-size: 0.86rem;
  }

  .fc .fc-scrollgrid,
  .fc .fc-timegrid-body,
  .fc .fc-timegrid-slots,
  .fc .fc-daygrid-body {
    background: var(--fc-page-bg);
  }

  .fc .fc-col-header-cell,
  .fc .fc-timegrid-axis,
  .fc .fc-timegrid-slot-label {
    background: var(--fc-header-bg);
  }

  .fc .fc-timegrid-slot,
  .fc .fc-timegrid-axis,
  .fc .fc-col-header-cell {
    border-color: var(--fc-grid);
  }

  .fc .fc-toolbar {
    margin-bottom: 0.5em;
  }

  .fc .fc-toolbar-title {
    font-size: 1.03rem;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  .fc .fc-button {
    background: var(--fc-button-bg);
    border-color: var(--fc-button-border);
    color: var(--fc-button-text);
    text-transform: capitalize;
    box-shadow: none;
    font-size: 0.77rem;
    padding: 0.28em 0.55em;
    min-height: 0;
    line-height: 1.26;
  }

  .fc .fc-button:hover {
    filter: brightness(1.08);
  }

  .fc .fc-button-primary:not(:disabled).fc-button-active,
  .fc .fc-button-primary:not(:disabled):active {
    background: var(--accent);
    border-color: var(--accent-strong);
  }

  .fc .fc-col-header-cell-cushion,
  .fc .fc-timegrid-slot-label-cushion {
    color: var(--text-muted);
    font-weight: 700;
    text-decoration: none;
    font-size: 0.75rem;
  }

  .fc .fc-timegrid-now-indicator-line {
    border-color: #ef4444;
  }

  .fc .fc-timegrid-slot {
    height: 1.8em;
  }

  .fc .fc-event {
    border: 0;
    border-radius: 7px;
    padding: 2px 4px;
    font-weight: 700;
    font-size: 0.72rem;
    color: #f8fafc;
  }

  .fc-event[class*="s-"] {
    background: #2ea27f;
  }

  @media (max-width: 1100px) {
    .calendar-layout {
      grid-template-columns: 1fr;
    }

    .calendar-side {
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (max-width: 980px) {
    .app-shell {
      grid-template-columns: 1fr;
    }

    .mobile-top {
      display: flex;
    }

    .sidebar {
      position: fixed;
      left: -280px;
      width: 260px;
      transition: left 140ms ease;
      box-shadow: var(--shadow-md);
    }

    body.sidebar-open .sidebar {
      left: 0;
    }

    .sidebar-backdrop {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(13, 20, 30, 0.45);
      opacity: 0;
      visibility: hidden;
      transition: opacity 140ms ease;
    }

    body.sidebar-open .sidebar-backdrop {
      opacity: 1;
      visibility: visible;
    }

    .layout-main {
      padding: 14px;
    }

    .page-header {
      flex-direction: column;
      align-items: flex-start;
    }
  }

  @media (max-width: 760px) {
    .cards-grid,
    .metric-grid-2,
    .form-split,
    .calendar-side {
      grid-template-columns: 1fr;
    }

    .recur-row {
      grid-template-columns: 1fr;
      align-items: stretch;
    }

    .toolbar {
      align-items: stretch;
    }

    .toolbar > * {
      width: 100%;
    }
  }
</style>
{{end}}
