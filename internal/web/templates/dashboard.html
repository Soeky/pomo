{{define "dashboard.html"}}
<!doctype html>
<html lang="en">
{{template "head.html" .}}
<body>
<div class="app-shell">
  {{template "sidebar.html" .}}
  <div class="sidebar-backdrop" onclick="document.body.classList.remove('sidebar-open')"></div>
  <main class="layout-main">
    <div class="mobile-top">
      <button class="btn btn-secondary mobile-toggle" type="button" onclick="document.body.classList.toggle('sidebar-open')">Menu</button>
      <div class="mobile-brand">pomo</div>
    </div>

    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <button class="btn btn-secondary" hx-get="/" hx-target="body" hx-swap="outerHTML">Refresh</button>
    </div>

    <div class="cards-grid">
      {{range .Modules}}
      <section class="card" id="module-{{.ID}}">
        <h2>{{.Title}}</h2>
        {{template "dashboard-module.html" .}}
      </section>
      {{end}}
    </div>
  </main>
</div>
</body>
</html>
{{end}}
