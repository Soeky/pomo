{{define "sql.html"}}
<!doctype html>
<html lang="en">
{{template "head.html" .}}
<body>
<div class="app-shell">
  {{template "sidebar.html" .}}
  <div class="sidebar-backdrop" onclick="document.body.classList.remove('sidebar-open')"></div>
  <main class="layout-main">
    <div class="mobile-top">
      <button class="btn btn-secondary mobile-toggle" type="button" onclick="document.body.classList.toggle('sidebar-open')">Menu</button>
      <div class="mobile-brand">pomo</div>
    </div>

    <div class="page-header">
      <h1 class="page-title">SQL Workspace</h1>
      <span class="badge">Read-only by default</span>
    </div>

    <section class="panel">
      <form hx-post="/sql/query" hx-target="#sql-result" hx-swap="innerHTML">
        <div class="toolbar">
          {{range .Tables}}
          <button class="btn btn-secondary" type="button" onclick="insertTable('{{.}}')">{{.}}</button>
          {{end}}
        </div>

        <textarea id="sql" name="query" placeholder="SELECT * FROM sessions LIMIT 20;"></textarea>

        <label>
          <input type="checkbox" name="write_mode" value="1">
          Enable write mode
        </label>

        <button class="btn btn-primary" type="submit">Run Query</button>
      </form>

      <div id="sql-result"></div>
    </section>
  </main>
</div>
<script>
function insertTable(name) {
  const t = document.getElementById('sql');
  t.value = `SELECT * FROM ${name} LIMIT 20;`;
}
</script>
</body>
</html>
{{end}}
