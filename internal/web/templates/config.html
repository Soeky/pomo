{{define "config.html"}}
<!doctype html>
<html lang="en">
{{template "head.html" .}}
<body>
<div class="app-shell">
  {{template "sidebar.html" .}}
  <div class="sidebar-backdrop" onclick="document.body.classList.remove('sidebar-open')"></div>
  <main class="layout-main">
    <div class="mobile-top">
      <button class="btn btn-secondary mobile-toggle" type="button" onclick="document.body.classList.toggle('sidebar-open')">Menu</button>
      <div class="mobile-brand">pomo</div>
    </div>

    <div class="page-header">
      <div>
        <h1 class="page-title">Config</h1>
        <p class="page-subtitle">List/get/set/describe configuration values with CLI-equivalent behavior.</p>
      </div>
      <span class="badge">Configuration</span>
    </div>

    <section class="panel">
      <h2>Set Value</h2>
      <form id="config-set-form" class="toolbar">
        <input name="key" placeholder="key" required>
        <input name="value" placeholder="value" required>
        <button class="btn btn-primary" type="submit">Set</button>
      </form>
      <form id="config-get-form" class="toolbar">
        <input name="key" placeholder="key" required>
        <button class="btn btn-secondary" type="submit">Get</button>
      </form>
      <form id="config-describe-form" class="toolbar">
        <input name="key" placeholder="key">
        <button class="btn btn-secondary" type="submit">Describe</button>
      </form>
      <button class="btn btn-secondary" id="config-refresh-btn" type="button">Refresh All</button>
      <pre id="config-output" class="code-shell"></pre>
      <p id="config-status" class="muted"></p>
    </section>
  </main>
</div>
<script>
(() => {
  const output = document.getElementById('config-output');
  const status = document.getElementById('config-status');

  function showStatus(message, isError) {
    status.textContent = message;
    status.className = isError ? 'status-error' : 'muted';
  }

  async function requestJSON(url, options = {}) {
    const res = await fetch(url, options);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'request failed');
    return data;
  }

  async function refreshAll() {
    const values = await requestJSON('/api/config');
    const descriptions = await requestJSON('/api/config/describe');
    output.textContent = JSON.stringify({ values, descriptions }, null, 2);
  }

  document.getElementById('config-refresh-btn').addEventListener('click', async () => {
    try {
      await refreshAll();
      showStatus('Config values loaded.');
    } catch (err) {
      showStatus(err.message, true);
    }
  });

  document.getElementById('config-set-form').addEventListener('submit', async (evt) => {
    evt.preventDefault();
    const fd = new FormData(evt.target);
    const key = (fd.get('key') || '').toString();
    const value = (fd.get('value') || '').toString();
    try {
      await requestJSON('/api/config/' + encodeURIComponent(key), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value })
      });
      await refreshAll();
      showStatus('Config updated.');
    } catch (err) {
      showStatus(err.message, true);
    }
  });

  document.getElementById('config-get-form').addEventListener('submit', async (evt) => {
    evt.preventDefault();
    const key = (new FormData(evt.target).get('key') || '').toString();
    try {
      const data = await requestJSON('/api/config/' + encodeURIComponent(key));
      output.textContent = JSON.stringify(data, null, 2);
      showStatus('Config value loaded.');
    } catch (err) {
      showStatus(err.message, true);
    }
  });

  document.getElementById('config-describe-form').addEventListener('submit', async (evt) => {
    evt.preventDefault();
    const key = (new FormData(evt.target).get('key') || '').toString().trim();
    try {
      const data = key ? await requestJSON('/api/config/describe/' + encodeURIComponent(key)) : await requestJSON('/api/config/describe');
      output.textContent = JSON.stringify(data, null, 2);
      showStatus('Config description loaded.');
    } catch (err) {
      showStatus(err.message, true);
    }
  });

  refreshAll().catch((err) => showStatus(err.message, true));
})();
</script>
</body>
</html>
{{end}}
